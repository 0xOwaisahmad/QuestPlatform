version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: web3_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: web3db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: web3_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: