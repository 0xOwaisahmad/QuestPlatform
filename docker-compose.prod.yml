version: '3.8'
services:
  app:
    build: .
    container_name: web3_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}  # Reads from .env
      - REDIS_URL=${REDIS_URL}        # Reads from .env
      - JWT_SECRET=${JWT_SECRET}      # Reads from .env
      - PORT=${PORT}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: web3_postgres
    restart: always
    environment:
      # These now pull directly from your .env file
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed!

  redis:
    image: redis:alpine
    container_name: web3_redis
    restart: always
    # No ports exposed!

volumes:
  pgdata: